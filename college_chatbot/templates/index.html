<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITM Gwalior — College Enquiry Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="shell">

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header-left">
      <div class="itm-badge">ITM</div>
      <div class="header-info">
        <h1>ITM Gwalior Chatbot</h1>
        <span class="header-sub">AI Admission Counsellor &nbsp;·&nbsp; NAAC 'A' Grade</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>Online</span>
      </div>
      <a href="/admin" class="admin-btn" target="_blank" title="Admin Panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Admin</span>
      </a>
    </div>
  </header>

  <!-- ── MESSAGES ── -->
  <div class="messages" id="chatWindow">
    <div class="date-divider">
      <span id="todayLabel"></span>
    </div>
  </div>

  <!-- ── TYPING ── -->
  <div id="typingRow" style="display:none;">
    <div class="av-sm">ITM</div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- ── INPUT ── -->
  <div class="input-shell">
    <div class="input-row">
      <input
        type="text"
        id="userInput"
        placeholder="Ask about fees, AIML, admission, hostel…"
        autocomplete="off"
        maxlength="500"
      />
      <button id="sendBtn" aria-label="Send" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             width="18" height="18" fill="currentColor">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="hint">Try: &ldquo;fees?&rdquo;, &ldquo;aiml&rdquo;, &ldquo;placement&rdquo;, &ldquo;hostel?&rdquo; or &ldquo;hello bhai&rdquo; 👋</p>
  </div>

</div>

<script src="/static/chat.js"></script>
</body>
</html>
